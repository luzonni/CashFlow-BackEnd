# DEV
%dev.quarkus.datasource.db-kind=${DB_KIND}
%dev.quarkus.datasource.username=${DB_USER}
%dev.quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.jdbc.url=${DB_URL}

# PROD
%prod.quarkus.datasource.db-kind=${DB_KIND}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

# TEST

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=true

# =======================================================

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true
quarkus.swagger-ui.always-include=true
quarkus.datasource.devservices.enabled=false

# Cors

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization

# MyAuth

auth.refresh-token.expiration-days=15
auth.access-token.expiration-minutes=15

# JWT

mp.jwt.verify.issuer=cashflow
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=accessToken
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
